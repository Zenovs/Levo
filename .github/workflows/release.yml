name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            ffmpeg

      - name: Install macOS deps
        if: matrix.platform == 'macos-latest'
        run: brew install ffmpeg

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $binDir = "src-tauri\binaries"
          New-Item -ItemType Directory -Force -Path $binDir
          $ffmpegBin = Get-ChildItem -Recurse ffmpeg_tmp -Name "ffmpeg.exe" | Select-Object -First 1
          $ffprobeBin = Get-ChildItem -Recurse ffmpeg_tmp -Name "ffprobe.exe" | Select-Object -First 1
          Copy-Item (Join-Path "ffmpeg_tmp" $ffmpegBin) "$binDir\ffmpeg.exe"
          Copy-Item (Join-Path "ffmpeg_tmp" $ffprobeBin) "$binDir\ffprobe.exe"
          Write-Host "FFmpeg binaries copied to $binDir"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional – set in repo secrets)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.tag }}
          releaseName: 'FFmpegUI ${{ github.ref_name || github.event.inputs.tag }}'
          releaseBody: |
            ## FFmpegUI ${{ github.ref_name || github.event.inputs.tag }}

            Eine plattformübergreifende Desktop-Anwendung für FFmpeg.

            ### Download
            - **Windows**: `.exe` (NSIS Installer) oder `.msi` (WiX)
            - **macOS**: `.dmg` (Universal Binary – Intel + Apple Silicon)
            - **Linux**: `.AppImage`, `.deb`

            ### Voraussetzungen
            - **Linux**: `sudo apt install ffmpeg` (falls nicht automatisch mitinstalliert)
            - **macOS**: `brew install ffmpeg` (falls nicht automatisch mitinstalliert)
            - **Windows**: FFmpeg wird automatisch mitgebündelt

            ### Änderungen
            Siehe [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          releaseDraft: false
          prerelease: false
          includeDebug: false
          args: ${{ matrix.args }}

  # Separate job for building Linux AppImage with bundled FFmpeg
  build-linux-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs: []
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            ffmpeg patchelf
      - run: npm ci
      - name: Build AppImage
        run: npm run tauri build -- --bundles appimage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
