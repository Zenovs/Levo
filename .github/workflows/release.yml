name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
            ffmpeg-url: 'https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz'
            ffmpeg-bin: 'ffmpeg-master-latest-linux64-gpl/bin'

          # ── macOS Universal ───────────────────────────────────────────────
          - platform: macos-latest
            target: universal-apple-darwin
            args: '--target universal-apple-darwin'
            ffmpeg-url: ''
            ffmpeg-bin: ''

          # ── Windows x86_64 ────────────────────────────────────────────────
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            ffmpeg-url: 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip'
            ffmpeg-bin: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Rust ───────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Linux system deps + FFmpeg ─────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf xz-utils

      - name: Bundle FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          wget -q "${{ matrix.ffmpeg-url }}" -O ffmpeg.tar.xz
          tar xf ffmpeg.tar.xz
          cp ${{ matrix.ffmpeg-bin }}/ffmpeg  src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          cp ${{ matrix.ffmpeg-bin }}/ffprobe src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/*
          echo "FFmpeg bundled:"
          ls -lh src-tauri/binaries/

      # ── macOS deps + FFmpeg ────────────────────────────────────────────────
      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install ffmpeg
          # Create universal binary directories
          mkdir -p src-tauri/binaries
          # Copy system ffmpeg as universal (brew on M1/Intel)
          cp $(which ffmpeg)  src-tauri/binaries/ffmpeg-universal-apple-darwin  2>/dev/null || \
            cp /opt/homebrew/bin/ffmpeg  src-tauri/binaries/ffmpeg-universal-apple-darwin  2>/dev/null || \
            cp /usr/local/bin/ffmpeg src-tauri/binaries/ffmpeg-universal-apple-darwin
          cp $(which ffprobe) src-tauri/binaries/ffprobe-universal-apple-darwin 2>/dev/null || \
            cp /opt/homebrew/bin/ffprobe src-tauri/binaries/ffprobe-universal-apple-darwin 2>/dev/null || \
            cp /usr/local/bin/ffprobe src-tauri/binaries/ffprobe-universal-apple-darwin
          chmod +x src-tauri/binaries/*
          echo "FFmpeg bundled (macOS):"
          ls -lh src-tauri/binaries/

      # ── Windows FFmpeg ─────────────────────────────────────────────────────
      - name: Bundle FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "${{ matrix.ffmpeg-url }}"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          New-Item -ItemType Directory -Force -Path "src-tauri\binaries"
          $ffmpegExe = Get-ChildItem -Recurse ffmpeg_tmp -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeExe = Get-ChildItem -Recurse ffmpeg_tmp -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName  "src-tauri\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item $ffprobeExe.FullName "src-tauri\binaries\ffprobe-x86_64-pc-windows-msvc.exe"
          Write-Host "FFmpeg bundled (Windows):"
          Get-ChildItem "src-tauri\binaries\"

      # ── NPM install ────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Build & Release ────────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing (optional – set in repo secrets)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name || github.event.inputs.tag }}
          releaseName: 'Levo ${{ github.ref_name || github.event.inputs.tag }}'
          releaseBody: |
            ## Levo ${{ github.ref_name || github.event.inputs.tag }}

            Eine plattformübergreifende FFmpeg Desktop-App.

            ### 📥 Download
            | Plattform | Datei |
            |---|---|
            | **Windows** | `Levo_x.x.x_x64-setup.exe` (Installer) oder `.msi` |
            | **macOS** | `Levo_x.x.x_universal.dmg` (Intel + Apple Silicon) |
            | **Linux** | `levo_x.x.x_amd64.AppImage` oder `.deb` |

            ### ✅ FFmpeg
            - **Windows**: FFmpeg ist bereits im Installer enthalten – keine separate Installation nötig
            - **macOS**: FFmpeg wird mitgebündelt
            - **Linux (.deb)**: FFmpeg wird automatisch als Abhängigkeit installiert
            - **Linux (.AppImage)**: FFmpeg ist eingebettet

            ### 🔄 Auto-Update
            Über `Einstellungen → Updates` oder das Aktualisierungssymbol in der Toolbar.
          releaseDraft: false
          prerelease: false
          includeDebug: false
          args: ${{ matrix.args }}
